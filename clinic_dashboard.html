<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clinic Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-dark border-bottom mb-4">
  <div class="container-fluid">
    <span id="clinicInfo" class="navbar-brand"></span>
    <button id="logoutBtn" class="btn btn-outline-danger">Logout</button>
  </div>
</nav>

<div class="container mt-3">
  <h2 class="mb-4 text-center">Pending Referrals</h2>

  <table class="table table-dark table-striped">
    <thead>
    <tr>
      <th>Patient Name</th>
      <th>Age</th>
      <th>NIC</th>
      <th>Hospital</th>
      <th>Clinic Date</th>
      <th>Status</th>
    </tr>
    </thead>
    <tbody id="referralsTable"></tbody>
  </table>
</div>

<script type="module">
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const clinicInfoEl = document.getElementById("clinicInfo");
  const referralsTable = document.getElementById("referralsTable");
  const logoutBtn = document.getElementById("logoutBtn");

  const clinicData = JSON.parse(localStorage.getItem("clinic"));
  if (clinicData) {
    clinicInfoEl.textContent = `Logged in as: ${clinicData.clinic_name}`;
  } else {
    clinicInfoEl.textContent = "Not logged in";
  }

  async function loadReferrals() {
    const { data: referrals } = await supabase.from("referrals")
            .select(`
        referral_id,
        status,
        patients(name, age, nic),
        hospitals(hospital_name),
        clinic_days(date)
      `)
            .eq("clinic_id", clinicData.clinic_id)
            .order("referral_id", { ascending: false });

    referralsTable.innerHTML = "";

    referrals.forEach(r => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${r.patients.name}</td>
        <td>${r.patients.age}</td>
        <td>${r.patients.nic}</td>
        <td>${r.hospitals.hospital_name}</td>
        <td>${r.clinic_days.date}</td>
        <td><span class="badge bg-warning text-dark">${r.status}</span></td>
      `;
      referralsTable.appendChild(row);
    });
  }

  logoutBtn.addEventListener("click", () => {
    localStorage.removeItem("clinic");
    window.location.href = "clinic_login.html";
  });

  loadReferrals();
</script>

</body>
</html>
