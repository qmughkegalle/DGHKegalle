<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pending Referrals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
  <h2 id="clinicName" class="mb-4 text-center">Pending Referrals</h2>

  <table class="table table-dark table-striped">
    <thead>
    <tr>
      <th>Patient Name</th>
      <th>Age</th>
      <th>NIC</th>
      <th>Clinic Date</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody id="referralsTable">
    <!-- Rows injected here -->
    </tbody>
  </table>
</div>

<script type="module">
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const clinicNameEl = document.getElementById("clinicName");
  const referralsTable = document.getElementById("referralsTable");

  // Get clinic_id from URL
  const params = new URLSearchParams(window.location.search);
  const clinicId = params.get("clinic_id");

  // Load clinic info
  async function loadClinicInfo() {
    const { data: clinic } = await supabase.from("clinics")
            .select("*")
            .eq("clinic_id", clinicId)
            .single();
    clinicNameEl.textContent = `Pending Referrals - ${clinic.clinic_name}`;
  }

  // Load pending referrals
  async function loadPendingReferrals() {
    const { data: referrals } = await supabase.from("referrals")
            .select(`
        referral_id,
        status,
        patients(name, age, nic),
        clinic_days(date)
      `)
            .eq("clinic_id", clinicId)
            .eq("status", "awaiting")
            .order("referral_id", { ascending: false });

    referralsTable.innerHTML = "";

    referrals.forEach(r => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${r.patients.name}</td>
        <td>${r.patients.age}</td>
        <td>${r.patients.nic}</td>
        <td>${r.clinic_days.date}</td>
        <td><span class="badge bg-warning text-dark">${r.status}</span></td>
        <td>
          <a href="edit.html?referral_id=${r.referral_id}&clinic_id=${clinicId}"
             class="btn btn-sm btn-info">Edit</a>
        </td>
      `;
      referralsTable.appendChild(row);
    });
  }

  // Init
  loadClinicInfo();
  loadPendingReferrals();
</script>

</body>
</html>
