<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clinic Login - Kegalle Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <h2 class="mb-4 text-center">Clinic Login - Kegalle Hospital</h2>

    <!-- Clinic Dropdown -->
    <div class="mb-3">
        <label class="form-label">Select Clinic</label>
        <select id="clinicSelect" class="form-select"></select>
    </div>

    <!--  Password -->
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="clinicPassword" class="form-control">
    </div>

    <button id="loginBtn" class="btn btn-primary">Login</button>
</div>

<script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const clinicSelect = document.getElementById("clinicSelect");
    const loginBtn = document.getElementById("loginBtn");

    // Load clinics into dropdown
    async function loadClinics() {
        const { data: clinics } = await supabase.from("clinics").select("clinic_id, clinic_name").eq("active", true);
        clinicSelect.innerHTML = clinics.map(c =>
            `<option value="${c.clinic_id}">${c.clinic_name}</option>`
        ).join("");
    }

    // Login action
    loginBtn.addEventListener("click", async () => {
        const clinicId = clinicSelect.value;
        const clinicPassword = document.getElementById("clinicPassword").value;

        // Fetch clinic record
        const { data: clinic } = await supabase.from("clinics")
            .select("*")
            .eq("clinic_id", clinicId)
            .single();

        if (!clinic) {
            alert("Clinic not found!");
            return;
        }

        // For demo: compare plain text (replace with bcrypt check in production)
        if (clinic.password_hash !== clinicPassword) {
            alert("Invalid password!");
            return;
        }

        // Save clinic info in localStorage
        localStorage.setItem("clinic", JSON.stringify({
            clinic_id: clinic.clinic_id,
            clinic_name: clinic.clinic_name
        }));

        // Redirect to clinic dashboard
        window.location.href = "clinic_dashboard.html";
    });

    loadClinics();
</script>

</body>
</html>
