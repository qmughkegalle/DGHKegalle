<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
      <img src="../assets/images/icon.png" alt="Hospital Logo" width="30" height="30" class="me-2">
      DGH Kegalle Referral Portal
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <!-- No links or status on login page -->
    </div>
  </div>
</nav>



<div class="container mt-5">
  <h2 class="mb-4 text-center">Hospital Login</h2>

  <!-- Floating Portrait Div (light card style) -->
  <div class="position-absolute top-50 start-50 translate-middle bg-light shadow-lg rounded p-4 border border-secondary" style="width:300px;">

    <!-- Hospital Select -->
    <div class="mb-3">
      <label class="form-label">Select Hospital</label>
      <select id="hospitalSelect" class="form-select border-secondary"></select>
    </div>

    <!-- Password Field -->
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="hospitalPassword" class="form-control border-secondary" placeholder="Enter password">
    </div>

    <button id="loginBtn" class="btn btn-primary w-100">Login</button>
  </div>
</div>

<script type="module">
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const hospitalSelect = document.getElementById("hospitalSelect");
  const hospitalPassword = document.getElementById("hospitalPassword");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");


  // Check login status
  const storedHospital = localStorage.getItem("hospital");
  if (storedHospital) {
    // Already logged in → redirect to dashboard
    window.location.href = "dashboard.html";
  } else {

  }

  // Load hospitals from DB
  async function loadHospitals() {
    const { data: hospitals, error } = await supabase.from("hospitals").select("*");
    if (error) {
      console.error(error);
      return;
    }
    hospitalSelect.innerHTML = hospitals.map(h =>
            `<option value="${h.hospital_id}">${h.hospital_name}</option>`
    ).join("");
  }

  // Login action
  // Login action
  loginBtn.addEventListener("click", async () => {
    const hospitalId = hospitalSelect.value;
    const enteredPassword = hospitalPassword.value;

    const { data: hospital, error } = await supabase.from("hospitals")
            .select("*")
            .eq("hospital_id", hospitalId)
            .single();

    if (error || !hospital) {
      alert("Hospital not found.");
      return;
    }

    if (hospital.password !== enteredPassword) {
      alert("Invalid password. Please try again.");
      return;
    }

    // Save hospital info in localStorage
    localStorage.setItem("hospital", JSON.stringify({
      hospital_id: hospital.hospital_id,
      hospital_name: hospital.hospital_name
    }));

    // Redirect logic: only for Kegalle Hospital
    if (hospital.hospital_name.toLowerCase() === "kegalle hospital") {
      window.location.href = "clinic_login.html";
    } else {
      window.location.href = "dashboard.html";
    }
  });



  loadHospitals();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
<footer style="position: fixed; bottom: 0; width: 100%;">
  <div class="bg-dark text-white text-center py-2">
    © 2026 District General Hospital Kegalle
    <div style="font-size: 12px; color: #ccc; ">
      System developed and donated by K.A.N.N. Sooriyabandara @ 2026
    </div>
  </div>

</footer>
</html>
