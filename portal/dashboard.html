<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clinic Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
      <img src="../assets/images/icon.png" alt="Hospital Logo" width="30" height="30" class="me-2">
      DGH Kegalle Referral Portal
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse flex-column align-items-end" id="navbarNav">
      <!-- Links row -->
      <ul class="navbar-nav mb-2">
        <li class="nav-item"><a class="nav-link" href="refer.html">Refer a Patient</a></li>
        <li class="nav-item"><a class="nav-link" href="pending.html">View Pending Referrals</a></li>
        <li class="nav-item">
          <a id="logoutLink" class="nav-link text-danger" href="#">Logout</a>
        </li>

      </ul>
      <!-- Status line below links -->
      <div class="text-light small">
        <span id="loggedInStatus">Not logged in</span>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-5 text-center">
  <h2 id="clinicName" class="mb-4">Referring Dashboard</h2>

  <div class="d-flex justify-content-center gap-4">
    <a id="referBtn" class="btn btn-lg btn-primary px-4 py-3 shadow-sm rounded">Refer Patients</a>
    <a id="pendingBtn" class="btn btn-lg btn-secondary px-4 py-3 shadow-sm rounded">View Pending Referrals</a>
  </div>
</div>

<script type="module">
  const referBtn = document.getElementById("referBtn");
  const pendingBtn = document.getElementById("pendingBtn");
  const logoutLink = document.getElementById("logoutLink");
  const loggedInStatus = document.getElementById("loggedInStatus");

  // Check login status
  const storedHospital = localStorage.getItem("hospital");
  if (storedHospital) {
    const hospital = JSON.parse(storedHospital);
    loggedInStatus.textContent = hospital.hospital_name;
  } else {
    loggedInStatus.textContent = "Not logged in";
    // If not logged in, redirect to login
    window.location.href = "login.html";
  }

  // Set button links
  referBtn.href = "refer.html";
  pendingBtn.href = "pending.html";

  // Logout action
  logoutLink.addEventListener("click", (e) => {
    e.preventDefault();
    localStorage.removeItem("hospital");
    loggedInStatus.textContent = "Not logged in";
    alert("You have been logged out.");
    window.location.href = "login.html";
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
<footer style="position: fixed; bottom: 0; width: 100%;">
  <div class="bg-dark text-white text-center py-2">
    © 2026 District General Hospital Kegalle
    <div style="font-size: 12px; color: #ccc; ">
      System developed and donated by K.A.N.N. Sooriyabandara @ 2026
    </div>
  </div>

</footer>
</html>
