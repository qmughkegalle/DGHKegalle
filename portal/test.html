<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Referral Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="style.css" rel="stylesheet">
    <style>
        #clinicSuggestions {
            position: absolute;
            z-index: 1000;
            background: #212529;
            border: 1px solid #444;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
        }
        #clinicSuggestions div {
            padding: 8px;
            cursor: pointer;
        }
        #clinicSuggestions div:hover,
        #clinicSuggestions .active {
            background: #0d6efd;
            color: #fff;
        }
    </style>
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <h2 id="clinicName" class="mb-4 text-center">Referral Form</h2>

    <!-- Clinic Autocomplete -->
    <div class="mb-3 position-relative">
        <label class="form-label">Clinic</label>
        <input type="text" id="clinicInput" class="form-control" autocomplete="off" placeholder="Type clinic name">
        <div id="clinicSuggestions" class="d-none"></div>
    </div>

    <!-- Patient Form -->
    <div class="mb-3">
        <label class="form-label">Patient Name</label>
        <input type="text" id="patientName" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Age</label>
        <input type="number" id="patientAge" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">NIC</label>
        <input type="text" id="patientNIC" class="form-control">
    </div>

    <!-- Clinic Date Dropdown -->
    <div class="mb-3">
        <label class="form-label">Select Clinic Date</label>
        <select id="dateSelect" class="form-select"></select>
    </div>

    <button id="submitBtn" class="btn btn-primary">Submit Referral</button>
</div>

<script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const clinicNameEl = document.getElementById("clinicName");
    const clinicInput = document.getElementById("clinicInput");
    const clinicSuggestions = document.getElementById("clinicSuggestions");
    const dateSelect = document.getElementById("dateSelect");
    const nameInput = document.getElementById("patientName");
    const ageInput = document.getElementById("patientAge");
    const nicInput = document.getElementById("patientNIC");
    const submitBtn = document.getElementById("submitBtn");

    let selectedClinicId = null;
    let hospitalId = null;
    let clinics = [];
    let suggestionIndex = -1;

    async function getHospitalId() {
        const { data } = await supabase.from("hospitals")
            .select("hospital_id")
            .eq("hospital_name", "Warakapola Hospital")
            .single();
        hospitalId = data.hospital_id;
    }

    async function loadClinics() {
        const { data } = await supabase.from("clinics").select("*");
        clinics = data || [];
    }

    async function loadClinicDates() {
        if (!selectedClinicId) return;
        const today = new Date().toISOString().split("T")[0];
        const { data: days } = await supabase.from("clinic_days")
            .select("*")
            .eq("clinic_id", selectedClinicId)
            .gte("date", today)
            .eq("status", "open")
            .order("date", { ascending: true })
            .limit(10);

        dateSelect.innerHTML = "";

        for (const day of days) {
            const { count } = await supabase.from("referrals")
                .select("*", { count: "exact", head: true })
                .eq("assigned_clinic_day_id", day.clinic_day_id);

            if (count < day.capacity) {
                const option = document.createElement("option");
                option.value = day.clinic_day_id;
                option.textContent = `${day.date} (${count}/${day.capacity})`;
                dateSelect.appendChild(option);
            }
        }
    }

    async function submitReferral() {
        const name = nameInput.value;
        const age = ageInput.value;
        const nic = nicInput.value;
        const clinicDayId = dateSelect.value;

        if (!name || !age || !nic || !selectedClinicId || !clinicDayId) {
            alert("Please fill all fields!");
            return;
        }

        const { data: patient } = await supabase.from("patients").insert([
            { name, age, nic }
        ]).select().single();

        await supabase.from("referrals").insert([
            {
                patient_id: patient.patient_id,
                hospital_id: hospitalId,
                clinic_id: selectedClinicId,
                assigned_clinic_day_id: clinicDayId,
                status: "awaiting"
            }
        ]);

        alert("Referral submitted successfully!");

        // Clear form
        nameInput.value = "";
        ageInput.value = "";
        nicInput.value = "";
        clinicInput.value = "";
        dateSelect.value = "";

        clinicNameEl.textContent = "Referral Form";
        selectedClinicId = null;
        clinicSuggestions.classList.add("d-none");

        clinicInput.focus();
    }

    // Autocomplete logic
    clinicInput.addEventListener("input", () => {
        const query = clinicInput.value.toLowerCase();
        suggestionIndex = -1;
        if (!query) {
            clinicSuggestions.classList.add("d-none");
            return;
        }
        const matches = clinics.filter(c => c.clinic_name.toLowerCase().includes(query));
        clinicSuggestions.innerHTML = matches.map(c =>
            `<div data-id="${c.clinic_id}">${c.clinic_name}</div>`
        ).join("");
        clinicSuggestions.classList.toggle("d-none", matches.length === 0);
    });

    clinicSuggestions.addEventListener("click", e => {
        if (e.target.dataset.id) {
            selectClinic(e.target.dataset.id, e.target.textContent);
        }
    });

    clinicInput.addEventListener("keydown", e => {
        const items = clinicSuggestions.querySelectorAll("div");
        if (e.key === "ArrowDown") {
            e.preventDefault();
            suggestionIndex = (suggestionIndex + 1) % items.length;
            updateActive(items);
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            suggestionIndex = (suggestionIndex - 1 + items.length) % items.length;
            updateActive(items);
        } else if (e.key === "Enter") {
            e.preventDefault();
            if (items.length > 0) {
                if (suggestionIndex >= 0 && items[suggestionIndex]) {
                    selectClinic(items[suggestionIndex].dataset.id, items[suggestionIndex].textContent);
                } else {
                    selectClinic(items[0].dataset.id, items[0].textContent);
                }
            } else {
                // no suggestions, do nothing
            }
        }
    });

    function updateActive(items) {
        items.forEach((el, i) => el.classList.toggle("active", i === suggestionIndex));
    }

    async function selectClinic(id, name) {
        selectedClinicId = id;
        clinicInput.value = name;
        clinicSuggestions.classList.add("d-none");
        clinicNameEl.textContent = `Referral Form - ${name}`;
        await loadClinicDates();
        // Jump to Patient Name field after selecting clinic
        nameInput.focus();
    }

    // Keyboard navigation for other fields
    nameInput.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); ageInput.focus(); }
    });
    ageInput.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); nicInput.focus(); }
    });
    nicInput.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); dateSelect.focus(); }
    });
    dateSelect.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); submitReferral(); }
    });

    submitBtn.addEventListener("click", submitReferral);

    // Init
    getHospitalId();
    loadClinics();
</script>

</body>
</html>
