<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pending Referrals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="style.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="../assets/images/icon.png">

</head>
<body class="bg-light text-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="dashboard.html">
      <img src="../assets/images/icon.png" alt="Hospital Logo" width="30" height="30" class="me-2">
      DGH Kegalle Referral Portal
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse flex-column align-items-end" id="navbarNav">
      <ul class="navbar-nav mb-2">
        <li class="nav-item"><a class="nav-link" href="refer.html">Refer a Patient</a></li>
        <li class="nav-item"><a class="nav-link" href="pending.html">View Pending Referrals</a></li>
        <li class="nav-item"><a id="logoutLink" class="nav-link text-danger" href="#">Logout</a></li>
      </ul>
      <div class="text-light small">
        <span id="loggedInStatus">Not logged in</span>
      </div>
    </div>
  </div>
</nav>

<div class="container mt-5 bg-light">
  <h2 id="clinicName" class="mb-4 text-center">Pending Referrals</h2>

  <!-- Filters -->
  <div class="row mb-4">
    <div class="col-md-3">
      <label class="form-label">Filter by Clinic</label>
      <select id="clinicFilter" class="form-select"></select>
    </div>
    <div class="col-md-3">
      <label class="form-label">Filter by Clinic Date</label>
      <select id="dateFilter" class="form-select"></select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Search by Patient Name</label>
      <input type="text" id="nameSearch" class="form-control" placeholder="Enter name">
    </div>
    <div class="col-md-2 d-flex align-items-end">
      <button id="searchBtn" class="btn btn-primary w-100">Search</button>
    </div>
  </div>

  <table class="table table-light table-striped">
    <thead>
    <tr>
      <th>Patient Name</th>
      <th>Age</th>
      <th>NIC</th>
      <th>Clinic</th>
      <th>Clinic Date</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody id="referralsTable">
    <!-- Rows injected here -->
    </tbody>
  </table>
</div>

<script type="module">
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let hospitalId = null; // Will hold the logged-in hospital's ID
  const referralsTable = document.getElementById("referralsTable");
  const clinicFilter = document.getElementById("clinicFilter");
  const dateFilter = document.getElementById("dateFilter");
  const nameSearch = document.getElementById("nameSearch");
  const searchBtn = document.getElementById("searchBtn");
  const logoutLink = document.getElementById("logoutLink");
  const loggedInStatus = document.getElementById("loggedInStatus");

  // Kick out if not logged in
  const storedHospital = localStorage.getItem("hospital");
  if (!storedHospital) {
    window.location.href = "login.html";
  } else {
    const hospital = JSON.parse(storedHospital);
    loggedInStatus.textContent = hospital.hospital_name;
    hospitalId = hospital.hospital_id; // Store hospital ID for later use

  }

  logoutLink.addEventListener("click", (e) => {
    e.preventDefault();
    localStorage.removeItem("hospital");
    alert("You have been logged out.");
    window.location.href = "login.html";
  });

  // Load clinics for filter
  async function loadClinics() {
    const { data: clinics } = await supabase.from("clinics").select("*");
    clinicFilter.innerHTML = `<option value="">All Clinics</option>` +
            clinics.map(c => `<option value="${c.clinic_id}">${c.clinic_name}</option>`).join("");
  }

  // Load unique clinic dates for filter
  async function loadClinicDates() {
    const { data: dates } = await supabase.from("clinic_days")
            .select("date")
            .order("date", { ascending: true });

    const uniqueDates = [...new Set(dates.map(d => d.date))];
    dateFilter.innerHTML = `<option value="">All Dates</option>` +
            uniqueDates.map(d => `<option value="${d}">${d}</option>`).join("");
  }

  // Load pending referrals with filters
  async function loadPendingReferrals() {
    let query = supabase.from("referrals")
            .select(`
      referral_id,
      status,
      patients(name, age, nic),
      clinics(clinic_id, clinic_name),
      clinic_days(clinic_day_id, date)
    `)
            .eq("status", "awaiting")
            .eq("hospital_id", hospitalId)
            .order("referral_id", { ascending: false });

    // Apply filters only if values exist
    if (clinicFilter.value) {
      query = query.eq("clinic_id", clinicFilter.value);
    }
    if (dateFilter.value) {
      // ✅ safer: filter by clinic_day_id instead of joined date
      const { data: day } = await supabase.from("clinic_days")
              .select("clinic_day_id")
              .eq("date", dateFilter.value)
              .single();

      if (day) {
        query = query.eq("assigned_clinic_day_id", day.clinic_day_id);
      } else {
        referralsTable.innerHTML = "<tr><td colspan='7'>No referrals found for that date</td></tr>";
        return;
      }
    }
    if (nameSearch.value) {
      query = query.ilike("patients.name", `%${nameSearch.value}%`);
    }

    const { data: referrals } = await query;

    referralsTable.innerHTML = "";

    if (!referrals || referrals.length === 0) {
      referralsTable.innerHTML = "<tr><td colspan='7'>No referrals found</td></tr>";
      return;
    }

    referrals.forEach(r => {
      const row = document.createElement("tr");
      row.innerHTML = `
      <td>${r.patients.name}</td>
      <td>${r.patients.age}</td>
      <td>${r.patients.nic}</td>
      <td>${r.clinics.clinic_name}</td>
      <td>${r.clinic_days.date}</td>
      <td><span class="badge bg-warning text-dark">${r.status}</span></td>
      <td>
        <a href="refer.html?referral_id=${r.referral_id}" class="btn btn-sm btn-info me-2">Edit</a>
        <button class="btn btn-sm btn-danger deleteBtn" data-id="${r.referral_id}">Delete</button>
      </td>
    `;
      referralsTable.appendChild(row);
    });

    // Attach delete handlers
    document.querySelectorAll(".deleteBtn").forEach(btn => {
      btn.addEventListener("click", async (e) => {
        const referralId = e.target.dataset.id;
        if (confirm("Are you sure you want to delete this referral?")) {
          await supabase.from("referrals").delete().eq("referral_id", referralId);
          alert("Referral deleted successfully.");
          loadPendingReferrals();
        }
      });
    });
  }


  // Search button applies all filters at once
  searchBtn.addEventListener("click", loadPendingReferrals);

  // Init
  loadClinics();
  loadClinicDates();
  loadPendingReferrals();
</script>
