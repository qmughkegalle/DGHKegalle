<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Referral Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="style.css" rel="stylesheet">
    <style>
        #clinicSuggestions {
            position: absolute;
            z-index: 1000;
            background: #212529;
            border: 1px solid #444;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
        }
        #clinicSuggestions div {
            padding: 8px;
            cursor: pointer;
        }
        #clinicSuggestions div:hover,
        #clinicSuggestions .active {
            background: #0d6efd;
            color: #fff;
        }
    </style>
</head>
<body class=" text-light">

<!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
            <img src="images/icon.png" alt="Hospital Logo" width="30" height="30" class="me-2">
            DGH Kegalle Referral Portal
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse flex-column align-items-end" id="navbarNav">
            <ul class="navbar-nav mb-2">
                <li class="nav-item"><a class="nav-link" href="refer.html">Refer a Patient</a></li>
                <li class="nav-item"><a class="nav-link" href="pending.html">View Pending Referrals</a></li>
                <li class="nav-item"><a id="logoutLink" class="nav-link text-danger" href="#">Logout</a></li>
            </ul>
            <div class="text-light small">
                <span id="loggedInStatus">Not logged in</span>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 id="clinicName" class="mb-4 text-center">Referral Form</h2>

    <!-- Clinic Autocomplete -->
    <div class="mb-3 position-relative">
        <label class="form-label">Clinic</label>
        <input type="text" id="clinicInput" class="form-control" autocomplete="off" placeholder="Type clinic name">
        <div id="clinicSuggestions" class="d-none bg-light"></div>
    </div>

    <!-- Patient Form -->
    <div class="mb-3">
        <label class="form-label">Patient Name</label>
        <input type="text" id="patientName" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Age</label>
        <input type="number" id="patientAge" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">NIC</label>
        <input type="text" id="patientNIC" class="form-control">
    </div>

    <!-- Clinic Date Dropdown -->
    <div class="mb-3">
        <label class="form-label">Select Clinic Date</label>
        <select id="dateSelect" class="form-select"></select>
    </div>

    <button id="submitBtn" class="btn btn-primary w-100">Submit Referral</button>
</div>

<script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // Check if editing
    const params = new URLSearchParams(window.location.search);
    const referralId = params.get("referral_id");

    const clinicNameEl = document.getElementById("clinicName");
    const clinicInput = document.getElementById("clinicInput");
    const clinicSuggestions = document.getElementById("clinicSuggestions");
    const dateSelect = document.getElementById("dateSelect");
    const nameInput = document.getElementById("patientName");
    const ageInput = document.getElementById("patientAge");
    const nicInput = document.getElementById("patientNIC");
    const submitBtn = document.getElementById("submitBtn");
    const logoutLink = document.getElementById("logoutLink");
    const loggedInStatus = document.getElementById("loggedInStatus");

    let selectedClinicId = null;
    let hospitalId = null;
    let clinics = [];
    let suggestionIndex = -1;

    // Kick out if not logged in
    const storedHospital = localStorage.getItem("hospital");
    if (!storedHospital) {
        window.location.href = "login.html";
    } else {
        const hospital = JSON.parse(storedHospital);
        loggedInStatus.textContent = hospital.hospital_name;
        hospitalId = hospital.hospital_id; // Store hospital ID for later use
    }

    logoutLink.addEventListener("click", (e) => {
        e.preventDefault();
        localStorage.removeItem("hospital");
        alert("You have been logged out.");
        window.location.href = "login.html";
    });



    async function loadClinics() {
        const { data } = await supabase.from("clinics").select("*");
        clinics = data || [];
    }

    async function loadClinicDates() {
        if (!selectedClinicId) return;
        const today = new Date().toISOString().split("T")[0];
        const { data: days } = await supabase.from("clinic_days")
            .select("*")
            .eq("clinic_id", selectedClinicId)
            .gte("date", today)
            .eq("status", "open")
            .order("date", { ascending: true })
            .limit(10);

        dateSelect.innerHTML = "";
        let availableCount = 0;

        for (const day of days) {
            // ✅ Count referrals for THIS hospital in THIS clinic (not just the day)
            const { count } = await supabase.from("referrals")
                .select("*", { count: "exact", head: true })
                .eq("clinic_id", selectedClinicId)
                .eq("hospital_id", hospitalId)
                .eq("assigned_clinic_day_id", day.clinic_day_id);

            // Per-hospital quota = 1/3 of total daily capacity
            const perHospitalLimit = Math.floor(day.capacity / 3);

            if (count < perHospitalLimit) {
                const option = document.createElement("option");
                option.value = day.clinic_day_id;
                option.textContent = `${day.date} (${count}/${perHospitalLimit})`;
                dateSelect.appendChild(option);
                availableCount++;
            }
        }

        if (availableCount === 0) {
            const option = document.createElement("option");
            option.disabled = true;
            option.textContent = "No available dates (quota reached)";
            dateSelect.appendChild(option);
        }
    }



    async function submitReferral() {
        const name = nameInput.value;
        const age = ageInput.value;
        const nic = nicInput.value;
        const clinicDayId = dateSelect.value;

        if (!name || !age || !nic || !selectedClinicId || !clinicDayId) {
            alert("Please fill all fields!");
            return;
        }

        if (referralId) {
            // EDIT MODE: update patient + referral
            const { data: referral } = await supabase.from("referrals")
                .select("patient_id")
                .eq("referral_id", referralId)
                .single();

            await supabase.from("patients")
                .update({ name, age, nic })
                .eq("patient_id", referral.patient_id);

            await supabase.from("referrals")
                .update({
                    clinic_id: selectedClinicId,
                    assigned_clinic_day_id: clinicDayId
                })
                .eq("referral_id", referralId);

            alert("Referral updated successfully!");
            printReceipt( { name, age, nic }, clinicInput.value, dateSelect.options[dateSelect.selectedIndex].text.split(" ")[0] );
            window.location.href = "pending.html"; // ✅ redirect only in edit mode
        } else {
            // NEW MODE: insert patient + referral
            const { data: patient } = await supabase.from("patients").insert([
                { name, age, nic }
            ]).select().single();

            await supabase.from("referrals").insert([
                {
                    patient_id: patient.patient_id,
                    hospital_id: hospitalId,
                    clinic_id: selectedClinicId,
                    assigned_clinic_day_id: clinicDayId,
                    status: "awaiting"
                }
            ]);

            alert("Referral submitted successfully!");

            printReceipt( { name, age, nic }, clinicInput.value, dateSelect.options[dateSelect.selectedIndex].text.split(" ")[0] );

            nameInput.value = "";
            ageInput.value = "";
            nicInput.value = "";
            clinicInput.value = "";
            dateSelect.value = "";

            clinicNameEl.textContent = "Referral Form";
            selectedClinicId = null;
            clinicSuggestions.classList.add("d-none");

            clinicInput.focus();
        }
    }



    // Autocomplete logic
    clinicInput.addEventListener("input", () => {
        const query = clinicInput.value.toLowerCase();
        suggestionIndex = -1;
        if (!query) {
            clinicSuggestions.classList.add("d-none");
            return;
        }
        const matches = clinics.filter(c => c.clinic_name.toLowerCase().includes(query));
        clinicSuggestions.innerHTML = matches.map(c =>
            `<div data-id="${c.clinic_id}">${c.clinic_name}</div>`
        ).join("");
        clinicSuggestions.classList.toggle("d-none", matches.length === 0);
    });

    clinicSuggestions.addEventListener("click", e => {
        if (e.target.dataset.id) {
            selectClinic(e.target.dataset.id, e.target.textContent);
        }
    });

    clinicInput.addEventListener("keydown", e => {
        const items = clinicSuggestions.querySelectorAll("div");
        if (e.key === "ArrowDown") {
            e.preventDefault();
            suggestionIndex = (suggestionIndex + 1) % items.length;
            updateActive(items);
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            suggestionIndex = (suggestionIndex - 1 + items.length) % items.length;
            updateActive(items);
        } else if (e.key === "Enter") {
            e.preventDefault();
            if (items.length > 0) {
                if (suggestionIndex >= 0 && items[suggestionIndex]) {
                    selectClinic(items[suggestionIndex].dataset.id, items[suggestionIndex].textContent);
                } else {
                    // auto select top suggestion if exists
                    selectClinic(items[0].dataset.id, items[0].textContent);
                }
            } else {
                // no suggestions, do nothing
            }
        }
    });

    function updateActive(items) {
        items.forEach((el, i) => el.classList.toggle("active", i === suggestionIndex));
    }

    async function selectClinic(id, name) {
        selectedClinicId = id;
        clinicInput.value = name;
        clinicSuggestions.classList.add("d-none");
        clinicNameEl.textContent = `Referral Form - ${name}`;
        await loadClinicDates();
        // Jump to Patient Name field after selecting clinic
        nameInput.focus();
    }

    // Keyboard navigation for other fields
    nameInput.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); ageInput.focus(); }
    });
    ageInput.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); nicInput.focus(); }
    });
    nicInput.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); dateSelect.focus(); }
    });
    dateSelect.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); submitReferral(); }
    });

    submitBtn.addEventListener("click", submitReferral);

    // Init

    loadClinics();
    loadReferralForEdit();

    async function loadReferralForEdit() {
        if (!referralId) return;

        const { data: referral } = await supabase.from("referrals")
            .select(`
      referral_id,
      patients(name, age, nic),
      clinic_id,
      clinics(clinic_name),
      clinic_days(clinic_day_id, date)
    `)
            .eq("referral_id", referralId)
            .single();

        if (referral) {
            nameInput.value = referral.patients.name;
            ageInput.value = referral.patients.age;
            nicInput.value = referral.patients.nic;
            selectedClinicId = referral.clinic_id;

            // ✅ Now clinic name is available
            clinicInput.value = referral.clinics?.clinic_name || "";
            clinicNameEl.textContent = `Edit Referral`;
            submitBtn.textContent = "Update Referral";
            await loadClinicDates();
            dateSelect.value = referral.clinic_days.clinic_day_id;
        }
    }

    function printReceipt(patientData, clinicName, clinicDate) {
        const receiptWindow = window.open("", "_blank");
        receiptWindow.document.write(`
  <html>
  <head>
    <title>Referral Receipt</title>
    <style>
      @page { size: B5; margin: 20mm; }
      body { font-family: Arial, sans-serif; font-size: 14px; }
      h1 { text-align: center; font-size: 28px; margin-bottom: 10px; }
      h2 { text-align: center; font-size: 20px; margin-bottom: 30px; color: #333; }

      table { width: 100%; border-collapse: collapse; margin-top: 10px; }
      td { padding: 6px; border-bottom: 1px solid #ccc; }
      .important { margin-top: 30px; text-align: center; font-size: 16px; font-weight: bold; }
      .footer { margin-top: 20px; text-align: center; font-size: 12px; }
      .credit { margin-top: 30px; text-align: center; font-size: 11px; color: #555; }
    </style>
  </head>
  <body>
    <h1>District General Hospital Kegalle</h1>
    <h2>External Referral Receipt</h2>

    <table>
      <tr><td><strong>Patient Name:</strong></td><td>${patientData.name}</td></tr>
      <tr><td><strong>Age:</strong></td><td>${patientData.age}</td></tr>
      <tr><td><strong>NIC:</strong></td><td>${patientData.nic}</td></tr>
      <tr><td><strong>Clinic:</strong></td><td>${clinicName}</td></tr>
      <tr><td><strong>Clinic Date:</strong></td><td>${clinicDate}</td></tr>
    </table>

    <div class="important">
      Please bring this receipt when attending your clinic appointment.
      <br><br>
      කරුණාකර සායනයට පැමිණෙන විට මෙම රිසිට් පත රැගෙන එන්න
    </div>

    <div class="footer">
      This is a computer generated document and does not require a signature to be validated.
    </div>

    <div class="credit">
      System developed and donated by K.A.N.N. Sooriyabandara @ 2026
    </div>
  </body>
  </html>
`);

        receiptWindow.document.close();
        receiptWindow.print();
    }

</script>

</body>

</html>
