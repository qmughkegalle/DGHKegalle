<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doctors - DGH Kegalle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">DGH Kegalle</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="doctors.html">Doctors</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
      </ul>
    </div>
  </div>
</nav>

<section id="doctors" class="doctors-section">
  <div class="container text-center">
    <h2 class="section-title">Our Doctors</h2>
    <div class="row g-4 mb-5">
      <div class="col-md-4">
        <div class="card doctor-card p-4 shadow animate__animated animate__fadeInUp">
          <h5>Dr. A. Perera</h5>
          <p>Cardiologist</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card doctor-card p-4 shadow animate__animated animate__fadeInUp animate__delay-1s">
          <h5>Dr. B. Silva</h5>
          <p>General Physician</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card doctor-card p-4 shadow animate__animated animate__fadeInUp animate__delay-2s">
          <h5>Dr. C. Fernando</h5>
          <p>Pediatrician</p>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="stat-number" data-target="99">0</div>
        <p>Expert Staff</p>
      </div>
      <div class="col-md-4">
        <div class="stat-number" data-target="37">0</div>
        <p>Years of Service</p>
      </div>
      <div class="col-md-4">
        <div class="stat-number" data-target="18000">0</div>
        <p>Satisfied Patients</p>
      </div>
    </div>

    <!-- View More Button -->
    <a href="doctors.html" class="btn btn-accent animate__animated animate__pulse animate__infinite">View More Doctors</a>
  </div>
</section>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
