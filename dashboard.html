<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clinic Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5 text-center">
  <h2 id="clinicName" class="mb-4">Clinic Dashboard</h2>

  <div class="d-flex justify-content-center gap-3">
    <a id="referBtn" class="btn btn-primary">Refer Patient</a>
    <a id="pendingBtn" class="btn btn-secondary">View Pending Referrals</a>
  </div>
</div>

<script type="module">
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const clinicNameEl = document.getElementById("clinicName");
  const referBtn = document.getElementById("referBtn");
  const pendingBtn = document.getElementById("pendingBtn");

  // Get clinic_id from URL
  const params = new URLSearchParams(window.location.search);
  const clinicId = params.get("clinic_id");

  // Load clinic info
  async function loadClinicInfo() {
    const { data: clinic } = await supabase.from("clinics")
            .select("*")
            .eq("clinic_id", clinicId)
            .single();

    clinicNameEl.textContent = `Dashboard - ${clinic.clinic_name}`;

    // Set button links
    referBtn.href = `refer.html?clinic_id=${clinicId}`;
    pendingBtn.href = `pending.html?clinic_id=${clinicId}`;
  }

  loadClinicInfo();
</script>

</body>
</html>
