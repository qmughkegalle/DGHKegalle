<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kegalle Hospital Clinics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Hospital Dashboard</a>
        <div class="d-flex">
            <span id="hospitalInfo" class="me-3 text-light"></span>
            <button id="logoutBtn" class="btn btn-outline-danger">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-3">
    <h2 class="mb-4 text-center">Clinics at Kegalle Hospital</h2>

    <div class="row" id="clinicCards">
        <!-- Cards injected here -->
    </div>
</div>

<script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const hospitalInfoEl = document.getElementById("hospitalInfo");
    const clinicCards = document.getElementById("clinicCards");
    const logoutBtn = document.getElementById("logoutBtn");

    // Fetch hospital info from localStorage (set during login)
    const hospitalData = JSON.parse(localStorage.getItem("hospital"));
    if (hospitalData) {
        hospitalInfoEl.textContent = `Logged in as: ${hospitalData.hospital_name}`;
    } else {
        hospitalInfoEl.textContent = "Not logged in";
    }

    // Load all clinics at Kegalle Hospital
    async function loadClinics() {
        const { data: clinics } = await supabase.from("clinics")
            .select("*")
            .eq("active", true);

        clinicCards.innerHTML = "";

        clinics.forEach(clinic => {
            const card = document.createElement("div");
            card.className = "col-md-4 mb-4";

            card.innerHTML = `
        <div class="card h-100 shadow-sm">
          <img src="https://placehold.co/400x200?text=Clinic+Image"
               class="card-img-top" alt="Clinic Image">
          <div class="card-body">
            <h5 class="card-title">${clinic.clinic_name}</h5>
            <p class="card-text">
              <strong>Clinic Days:</strong> Monday, Tuesday
            </p>
            <p class="card-text">
              <strong>Max Referrals:</strong> ${clinic.max_referrals_per_day}
            </p>
            <a href="dashboard.html?clinic_id=${clinic.clinic_id}"
               class="btn btn-primary mt-2">Open Dashboard</a>
          </div>
        </div>
      `;

            clinicCards.appendChild(card);
        });
    }

    // Logout clears localStorage and redirects to login
    logoutBtn.addEventListener("click", () => {
        localStorage.removeItem("hospital");
        window.location.href = "login.html";
    });

    loadClinics();
</script>

</body>
</html>
