<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
  <h2 class="mb-4 text-center ">Hospital Login</h2>

  <!-- Floating Portrait Div (dark themed) -->
  <div class="position-absolute top-50 start-50 translate-middle bg-dark shadow-lg rounded p-4 border border-secondary" style="width:300px;">

    <!-- Hospital Select -->
    <div class="mb-3">
      <label class="form-label text-light">Select Hospital</label>
      <select id="hospitalSelect" class="form-select bg-dark text-light border-secondary"></select>
    </div>

    <!-- Password Field -->
    <div class="mb-3">
      <label class="form-label text-light">Password</label>
      <input type="password" id="hospitalPassword" class="form-control bg-dark text-light border-secondary" placeholder="Enter password">
    </div>

    <button id="loginBtn" class="btn btn-primary w-100">Login</button>
  </div>
</div>

<script type="module">
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const hospitalSelect = document.getElementById("hospitalSelect");
  const hospitalPassword = document.getElementById("hospitalPassword");
  const loginBtn = document.getElementById("loginBtn");

  // Load hospitals from DB
  async function loadHospitals() {
    const { data: hospitals, error } = await supabase.from("hospitals").select("*");
    if (error) {
      console.error(error);
      return;
    }
    hospitalSelect.innerHTML = hospitals.map(h =>
            `<option value="${h.hospital_id}">${h.hospital_name}</option>`
    ).join("");
  }

  // Login action
  loginBtn.addEventListener("click", async () => {
    const hospitalId = hospitalSelect.value;
    const enteredPassword = hospitalPassword.value;

    const { data: hospital, error } = await supabase.from("hospitals")
            .select("*")
            .eq("hospital_id", hospitalId)
            .single();

    if (error || !hospital) {
      alert("Hospital not found.");
      return;
    }

    // Check password
    if (hospital.password !== enteredPassword) {
      alert("Invalid password. Please try again.");
      return;
    }

    // Save hospital info in localStorage
    localStorage.setItem("hospital", JSON.stringify({
      hospital_id: hospital.hospital_id,
      hospital_name: hospital.hospital_name
    }));

    // Redirect to clinics dashboard
    window.location.href = "clinics.html";
  });

  loadHospitals();
</script>

</body>


</html>
