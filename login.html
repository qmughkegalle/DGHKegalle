<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
  <h2 class="mb-4 text-center">Hospital Login</h2>

  <!-- Hospital Select -->
  <div class="mb-3">
    <label class="form-label">Select Hospital</label>
    <select id="hospitalSelect" class="form-select"></select>
  </div>

  <button id="loginBtn" class="btn btn-primary">Login</button>
</div>

<script type="module">
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const hospitalSelect = document.getElementById("hospitalSelect");
  const loginBtn = document.getElementById("loginBtn");

  // Load hospitals from DB
  async function loadHospitals() {
    const { data: hospitals } = await supabase.from("hospitals").select("*");
    hospitalSelect.innerHTML = hospitals.map(h =>
            `<option value="${h.hospital_id}">${h.hospital_name}</option>`
    ).join("");
  }

  // Login action
  loginBtn.addEventListener("click", async () => {
    const hospitalId = hospitalSelect.value;
    const { data: hospital } = await supabase.from("hospitals")
            .select("*")
            .eq("hospital_id", hospitalId)
            .single();

    // Save hospital info in localStorage
    localStorage.setItem("hospital", JSON.stringify({
      hospital_id: hospital.hospital_id,
      hospital_name: hospital.hospital_name
    }));

    // Redirect to clinics dashboard
    window.location.href = "clinics.html";
  });

  loadHospitals();
</script>

</body>
</html>
