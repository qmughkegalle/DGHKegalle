<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Referral</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <h2 id="clinicName" class="mb-4 text-center">Edit Referral</h2>

    <!-- Patient Form -->
    <div class="mb-3">
        <label class="form-label">Patient Name</label>
        <input type="text" id="patientName" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Age</label>
        <input type="number" id="patientAge" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">NIC</label>
        <input type="text" id="patientNIC" class="form-control">
    </div>

    <!-- Clinic Date Dropdown -->
    <div class="mb-3">
        <label class="form-label">Select Clinic Date</label>
        <select id="dateSelect" class="form-select"></select>
    </div>

    <button id="updateBtn" class="btn btn-success">Update Referral</button>
</div>

<script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './dbKey.js';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const clinicNameEl = document.getElementById("clinicName");
    const nameInput = document.getElementById("patientName");
    const ageInput = document.getElementById("patientAge");
    const nicInput = document.getElementById("patientNIC");
    const dateSelect = document.getElementById("dateSelect");
    const updateBtn = document.getElementById("updateBtn");

    // Get params
    const params = new URLSearchParams(window.location.search);
    const referralId = params.get("referral_id");
    const clinicId = params.get("clinic_id");

    // Load clinic info
    async function loadClinicInfo() {
        const { data: clinic } = await supabase.from("clinics")
            .select("*")
            .eq("clinic_id", clinicId)
            .single();
        clinicNameEl.textContent = `Edit Referral - ${clinic.clinic_name}`;
    }

    // Load referral details
    async function loadReferral() {
        const { data: referral } = await supabase.from("referrals")
            .select(`
        referral_id,
        patient_id,
        patients(name, age, nic),
        assigned_clinic_day_id,
        clinic_days(date, capacity)
      `)
            .eq("referral_id", referralId)
            .single();

        if (referral) {
            nameInput.value = referral.patients.name;
            ageInput.value = referral.patients.age;
            nicInput.value = referral.patients.nic;

            await loadClinicDates(referral.assigned_clinic_day_id);
        }
    }

    // Load next 10 NOT FULL clinic dates
    async function loadClinicDates(selectedDayId) {
        const today = new Date().toISOString().split("T")[0];
        const { data: days } = await supabase.from("clinic_days")
            .select("*")
            .eq("clinic_id", clinicId)
            .gte("date", today)
            .eq("status", "open")
            .order("date", { ascending: true })
            .limit(10);

        dateSelect.innerHTML = "";

        for (const day of days) {
            const { count } = await supabase.from("referrals")
                .select("*", { count: "exact", head: true })
                .eq("assigned_clinic_day_id", day.clinic_day_id);

            if (count < day.capacity) {
                const option = document.createElement("option");
                option.value = day.clinic_day_id;
                option.textContent = `${day.date} (${count}/${day.capacity})`;
                if (day.clinic_day_id === selectedDayId) {
                    option.selected = true;
                }
                dateSelect.appendChild(option);
            }
        }
    }

    // Update referral
    updateBtn.addEventListener("click", async () => {
        const name = nameInput.value;
        const age = ageInput.value;
        const nic = nicInput.value;
        const clinicDayId = dateSelect.value;

        // Update patient info
        const { data: referral } = await supabase.from("referrals")
            .select("patient_id")
            .eq("referral_id", referralId)
            .single();

        await supabase.from("patients")
            .update({ name, age, nic })
            .eq("patient_id", referral.patient_id);

        // Update referral clinic day
        await supabase.from("referrals")
            .update({ assigned_clinic_day_id: clinicDayId })
            .eq("referral_id", referralId);

        alert("Referral updated successfully!");
    });

    // Init
    loadClinicInfo();
    loadReferral();
</script>

</body>
</html>
